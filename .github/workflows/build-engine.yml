name: Build & Publish s-blog-engine

on:
  push:
    tags:
      - 'engine-v*'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm-dir: npm/win32-x64-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
            npm-dir: npm/darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            npm-dir: npm/darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm-dir: npm/linux-x64-gnu

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates/s-blog-engine-napi

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Copy artifact to platform package
        shell: bash
        run: |
          # napi build outputs s_blog_engine_napi.{node,dll,...} in the cwd
          cp s-blog-engine-napi.*.node ${{ matrix.npm-dir }}/ 2>/dev/null || \
          cp s_blog_engine_napi.*.node ${{ matrix.npm-dir }}/ 2>/dev/null || true
          ls -la ${{ matrix.npm-dir }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/s-blog-engine-napi/${{ matrix.npm-dir }}/*.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/s-blog-engine-napi
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/s-blog-engine-napi/artifacts

      - name: Move artifacts to platform packages
        shell: bash
        run: |
          for dir in artifacts/bindings-*; do
            target=$(basename "$dir" | sed 's/bindings-//')
            case "$target" in
              x86_64-pc-windows-msvc)   dest="npm/win32-x64-msvc" ;;
              aarch64-apple-darwin)     dest="npm/darwin-arm64" ;;
              x86_64-apple-darwin)      dest="npm/darwin-x64" ;;
              x86_64-unknown-linux-gnu) dest="npm/linux-x64-gnu" ;;
              *) echo "Unknown target: $target"; continue ;;
            esac
            cp "$dir"/*.node "$dest"/
            echo "Copied $target -> $dest"
            ls -la "$dest"/
          done

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/*/; do
            if [ -f "$pkg/package.json" ]; then
              echo "Publishing $pkg ..."
              cd "$pkg"
              npm publish --access public || echo "Skipped (already published?)"
              cd -
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public || echo "Skipped (already published?)"
