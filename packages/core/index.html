<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-web@1.522.0/lxgwwenkaiscreen/result.css"
      media="all"
    />
    <title>S-Blog</title>
    <script>
      (function () {
        var savedLang = localStorage.getItem("i18nextLng");
        var userLang =
          savedLang || navigator.language || navigator.userLanguage;
        // Simple mapping to our supported langs
        var lang = "en";
        if (userLang) {
          if (userLang.startsWith("zh")) lang = "zh";
          else if (userLang.startsWith("ja")) lang = "ja";
        }
        document.documentElement.lang = lang;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/shell-entry.tsx"></script>
  </body>
</html>
